<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Undangan Mepandes</title>

<meta property="og:title" content="Undangan Upacara Mepandes">
<meta property="og:description" content="Dengan hormat kami mengundang Bapak/Ibu/Saudara/i untuk hadir pada Upacara Manusa Yadnya Mepandes serta memberikan doa restu.">
<meta property="og:image" content="https://i.imgur.com/6XbKQ9K.jpg">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Undangan Upacara Mepandes">
<meta name="twitter:description" content="Undangan Upacara Manusa Yadnya Mepandes">
<meta name="twitter:image" content="https://i.imgur.com/6XbKQ9K.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Poppins;background:#f6f2e9;color:#333;overflow-x:hidden;scroll-behavior:smooth;}
.cover{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;background:#efe7d5;padding:20px;}
.cover-box{animation:fadeUp 1.5s;max-width:650px;padding:20px;}
.cover p{font-size:19px;}
.mepandes{font-family:'Great Vibes';font-size:80px;color:#9b7a43;margin:10px 0;}
.btn{margin-top:35px;padding:16px 40px;border:none;border-radius:30px;background:#b79b65;color:white;font-size:17px;cursor:pointer;transition:0.3s;}
.btn:hover{transform:scale(1.05);}
.content{display:none;padding:40px 15px;}
.container{max-width:900px;margin:auto;background:white;padding:45px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.12);}
.section{opacity:0;transform:translateY(60px) scale(0.95);transition:all 0.8s ease;margin-bottom:50px;text-align:center;}
.section.show{opacity:1;transform:translateY(0) scale(1);}
p{line-height:1.8;}
.ukiran{font-family:'Playfair Display';font-size:22px;color:#9b7a43;letter-spacing:2px;text-align:center;margin-bottom:15px;}
.mantra{font-family:'Great Vibes';color:#9b7a43;font-size:32px;line-height:1.8;}
.arti{font-style:italic;margin-top:10px;}
.nama-box{margin-top:25px;text-align:center;}
.nama-orang{font-family:'Playfair Display';font-size:26px;color:#8b6a35;margin-bottom:8px;}
.orangtua{text-align:center;line-height:1.8;}
.info{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:20px;}
.info div{background:#f5f1e8;padding:18px;border-radius:12px;text-align:center;}
.countdown{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:20px;}
.countdown div{background:#b79b65;color:white;padding:14px;border-radius:10px;min-width:75px;text-align:center;}
.maps{margin-top:25px;border-radius:12px;overflow:hidden;}
.rsvp input,.rsvp textarea{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;font-family:Poppins;}
.status{display:flex;gap:10px;margin-top:12px;}
.status button{flex:1;border:none;background:#b79b65;color:white;padding:12px;border-radius:6px;cursor:pointer;}
.pesan{background:#f5f1e8;padding:12px;border-radius:10px;margin-top:10px;text-align:left;}
#musicBtn{position:fixed;bottom:18px;right:18px;background:#b79b65;border:none;width:42px;height:42px;border-radius:50%;color:white;cursor:pointer;font-size:16px;z-index:9999;box-shadow:0 4px 10px rgba(0,0,0,0.2);}
@media(max-width:768px){
.mepandes{font-size:55px;}
.container{padding:30px;}
.info{grid-template-columns:1fr;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

<body>

<audio id="musik" loop>
<source src="sound/lolaksound.mp3">
</audio>
<button id="musicBtn" onclick="toggleMusic()">▶</button>

<section class="cover" id="cover">
<div class="cover-box">
<p>Undangan Manusa Yadnya</p>
<div class="mepandes">Mepandes</div>
<p>Kepada Yth.</p>
<h3 id="namaTamu">Tamu Undangan</h3>
<button class="btn" onclick="bukaUndangan()">Buka Undangan</button>
</div>
</section>

<section class="content" id="content">
<div class="container">

<!-- ... bagian undangan sebelumnya tetap ... -->

<div class="section rsvp">
<h3>Ucapan & Doa</h3>
<input id="nama" placeholder="Nama">
<textarea id="pesan" placeholder="Ucapan / doa"></textarea>
<div class="status">
<button onclick="kirim('Hadir')">Hadir</button>
<button onclick="kirim('Tidak Hadir')">Tidak Hadir</button>
</div>
<div id="daftar"></div>
</div>

</div>
</section>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDrPdon4yx0OBijmlu4alVKvf4BiH3W9h4",
  authDomain: "undangan-mepandes-3bb8b.firebaseapp.com",
  databaseURL: "https://undangan-mepandes-3bb8b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "undangan-mepandes-3bb8b",
  storageBucket: "undangan-mepandes-3bb8b.firebasestorage.app",
  messagingSenderId: "333633571234",
  appId: "1:333633571234:web:c3032f6b7f92448adfcafb",
  measurementId: "G-YGHSXFEG35"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Ambil elemen
const daftar = document.getElementById("daftar");

// Kirim ucapan ke Realtime Database
function kirim(status){
  const nama = document.getElementById("nama").value.trim();
  const pesan = document.getElementById("pesan").value.trim();

  if(nama === ""){
    alert("Isi nama");
    return;
  }

  const ucapanRef = ref(db, 'ucapan'); // folder ucapan di DB
  push(ucapanRef, {
    nama,
    pesan,
    status,
    createdAt: serverTimestamp()
  });

  // Reset input
  document.getElementById("nama").value = "";
  document.getElementById("pesan").value = "";
}

// Realtime listener untuk menampilkan ucapan
const ucapanRef = ref(db, 'ucapan');
onValue(ucapanRef, (snapshot) => {
  const data = snapshot.val();
  let html = "";
  if(data){
    const entries = Object.values(data).sort((a,b) => a.createdAt - b.createdAt);
    entries.forEach(d => {
      html += `<div class="pesan"><b>${d.nama}</b> (${d.status})<br>${d.pesan}</div>`;
    });
  }
  daftar.innerHTML = html;
});

// Fungsi undangan dan musik
const params = new URLSearchParams(window.location.search)
let namaParam = params.get("to")
if(namaParam){
  namaParam = namaParam.replace(/\+/g," ")
  document.getElementById("namaTamu").innerText=decodeURIComponent(namaParam)
}

function bukaUndangan(){
  document.getElementById("cover").style.display="none"
  document.getElementById("content").style.display="block"
  let musik=document.getElementById("musik")
  let btn=document.getElementById("musicBtn")
  musik.play()
  btn.innerHTML="❚❚"
  setTimeout(()=>{
    document.querySelectorAll(".section").forEach(sec=>{
      sec.classList.add("show")
    })
  },200)
}

function toggleMusic(){
  let m=document.getElementById("musik")
  let btn=document.getElementById("musicBtn")
  if(m.paused){
    m.play()
    btn.innerHTML="❚❚"
  }else{
    m.pause()
    btn.innerHTML="▶"
  }
}

// Countdown
let target=new Date("March 25, 2026 08:00:00").getTime()
setInterval(()=>{
  let now=new Date().getTime()
  let sisa=target-now
  document.getElementById("hari").innerHTML=Math.floor(sisa/(1000*60*60*24))
  document.getElementById("jam").innerHTML=Math.floor((sisa%(1000*60*60*24))/(1000*60*60))
  document.getElementById("menit").innerHTML=Math.floor((sisa%(1000*60*60))/(1000*60))
  document.getElementById("detik").innerHTML=Math.floor((sisa%(1000*60))/1000)
},1000);
</script>

</body>
</html>
